name: Build Executables

on:
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output_name: VideoFileIntegrityCheck.exe
            build_cmd: pyinstaller --onefile --windowed --name VideoFileIntegrityCheck --add-data "ffmpeg_bin;ffmpeg_bin" main.py
          - os: macos-latest
            output_name: VideoFileIntegrityCheck.app
            build_cmd: pyinstaller --onefile --windowed --name VideoFileIntegrityCheck --add-data "ffmpeg_bin:ffmpeg_bin" main.py

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build executable
      run: ${{ matrix.build_cmd }}

    - name: List dist directory (debug)
      shell: bash
      run: |
        echo "Contents of dist directory:"
        ls -la dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        path: |
          dist/VideoFileIntegrityCheck*
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-latest-build
        path: ./windows-build

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: macos-latest-build
        path: ./macos-build

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ steps.date.outputs.date }}-${{ github.run_number }}
        name: Build ${{ steps.date.outputs.date }} #${{ github.run_number }}
        body: |
          Automated build from manual workflow trigger.
          
          **Build Information:**
          - Build Date: ${{ steps.date.outputs.date }}
          - Build Number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          
          **Files:**
          - VideoFileIntegrityCheck.exe (Windows)
          - VideoFileIntegrityCheck.app (macOS)
        files: |
          ./windows-build/*
          ./macos-build/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}